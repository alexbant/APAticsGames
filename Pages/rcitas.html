<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APAticGames</title>

  <link rel="icon" href="/images/image-Photoroom.png" type="image/png">

  <link rel="stylesheet" href="/css/rcitas.css">
  <link rel="stylesheet" href="/css/theme.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<script>if(localStorage.getItem('darkMode')==='enabled')document.body.classList.add('dark')</script>

<header class="header-retos">
  <a href="Inicio.html" class="logo">
    <img src="/images/image-Photoroom.png" alt="APAticGames">
  </a>
  <nav>
    <a href="Inicio.html">Inicio</a>
    <a href="juegos.html">Juegos</a>
    <a class="active" href="retos.html">Retos</a>
    <a href="cuenta.html">Cuenta</a>
    <a href="procesos.html">Estadísticas</a>
    <a class="btn-outline" href="ingresar.html">Ingresar</a>
  </nav>
</header>

<main class="game-container">

  <!-- INTRO -->
  <section id="intro" class="card">
    <span class="level">Reto especial</span>
    <h1><i class="fa-solid fa-quote-right"></i> Reto de Citas APA</h1>
    <p>
      Analiza citas académicas y detecta si están correctamente escritas según
      las normas APA 7.
    </p>
    <p>
      Cada desafío pondrá a prueba tu atención al detalle.
    </p>
    <button class="btn-primary" onclick="startGame()">Comenzar reto</button>
  </section>

  <!-- JUEGO -->
  <section id="quiz" class="card hidden">
    <p id="progress"></p>
    <p class="cita" id="citaTexto"></p>

    <div class="options">
      <button class="option" onclick="checkAnswer(true)">✔ Correcta</button>
      <button class="option" onclick="checkAnswer(false)">❌ Incorrecta</button>
    </div>
  </section>

  <!-- RESULTADO -->
  <section id="result" class="card hidden">
    <h2><i class="fa-solid fa-trophy"></i> Reto completado</h2>
    <p id="scoreText"></p>
    <p id="stars"></p>

    <a href="retos.html" class="btn-secondary">⬅ Volver a Retos</a>
  </section>

</main>

<footer></footer>

<script src="/js/theme.js"></script>
<script src="/js/rcitas.js"></script>
<script src="/js/footer.js" defer></script>
</body>
</html>
