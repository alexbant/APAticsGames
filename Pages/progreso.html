<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APAticGames</title>

  <link rel="icon" href="/images/image-Photoroom.png" type="image/png">

  <link rel="stylesheet" href="/css/progreso.css">
  <link rel="stylesheet" href="/css/theme.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<script>if(localStorage.getItem('darkMode')==='enabled')document.body.classList.add('dark')</script>

<header>
  <a href="Inicio.html" class="logo">
    <img src="/images/image-Photoroom.png" alt="APAticGames Logo">
  </a>
  <nav>
    <a href="Inicio.html">Inicio</a>
    <a href="juegos.html">Juegos</a>
    <a href="retos.html">Retos</a>
    <a href="cuenta.html">Cuenta</a>
    <a href="procesos.html">Estadísticas</a>
    <a class="btn-outline" href="ingresar.html">Ingresar</a>
  </nav>
</header>

<main class="layout">

  <!-- MENÚ -->
  <aside class="sidebar">
    <h3>Módulos APA</h3>
    <ul>
      <li><a href="citas.html"> Citas APA</a></li>
      <li><a href="referencias.html"> Referencias APA</a></li>
      <li><a href="formato.html"> Formato APA</a></li>
      <li class="active"> Mi progreso</li>
    </ul>
  </aside>

  <!-- CONTENIDO -->
  <section class="content">
    <h1><i class="fa-solid fa-chart-simple"></i> Mi progreso</h1>
    <p class="subtitle">
      Revisa tu avance en cada apartado de Normas APA.
    </p>

    <div class="progress-grid">

      <!-- CITAS -->
      <div class="progress-card">
        <h3><i class="fa-solid fa-book"></i> Citas APA</h3>
        <div class="bar">
          <div class="bar-fill" id="citasBar"></div>
        </div>
        <p id="citasText"></p>
      </div>

      <!-- REFERENCIAS -->
      <div class="progress-card">
        <h3><i class="fa-solid fa-bookmark"></i> Referencias APA</h3>
        <div class="bar">
          <div class="bar-fill" id="referenciasBar"></div>
        </div>
        <p id="referenciasText"></p>
      </div>

      <!-- FORMATO -->
      <div class="progress-card">
        <h3><i class="fa-solid fa-file-lines"></i> Formato APA</h3>
        <div class="bar">
          <div class="bar-fill" id="formatoBar"></div>
        </div>
        <p id="formatoText"></p>
      </div>

    </div>
  </section>

  <!-- SIDEBAR DERECHO -->
  <aside class="progress">
    <h3>Resumen general</h3>
    <p><strong>Módulos completados:</strong> <span id="modulosCompletos">0</span>/3</p>
    
    <div class="bar">
      <div class="bar-fill" id="generalBar"></div>
    </div>
    
    <p id="generalText"></p>
  </aside>
  

</main>

<footer></footer>

<script src="/js/theme.js" defer></script>
<script src="/js/progreso.js" defer></script>
<script src="/js/footer.js" defer></script>
</body>
</html>
